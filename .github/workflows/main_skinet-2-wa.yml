name: Build and deploy ASP.Net Core app to Azure Web App - Skinet-2-WA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Angular CLI
        run: npm install -g @angular/cli@21

      - name: Create environment files
        run: |
          mkdir -p client/src/environments
          echo "export const environment = { 
            production: true,
            apiUrl: 'api/',
            hubUrl: 'hub/',
            stripePublicKey: '${{ secrets.STRIPE_PUB_KEY }}'
          };" > client/src/environments/environment.ts
          cp client/src/environments/environment.ts client/src/environments/environment.production.ts

      - name: Install dependencies and build Angular
        run: |
          cd client
          npm install
          npm run build -- --configuration=production

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build and Publish API
        run: |
          dotnet build API/API.csproj --configuration Release --no-restore \
            -p:EnableDefaultCompileItems=true \
            -p:EnableDefaultContentItems=true
          
          dotnet publish API/API.csproj -c Release -o ./publish_output --no-restore
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish_output

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CF80D8CF6F8B4BA1827E2151F22D7937 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_77F5D6BE3EF84ED8995A2A40F63AA61A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BA3B7D59AD944BEEA7661CC5F45E4FCA }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Skinet-2-WA'
          slot-name: 'Production'
          package: .
          