<!-- Contenedor Principal (Esquina inferior derecha) -->
<div class="fixed bottom-6 right-6 z-50 flex flex-col items-end font-sans">
  @if (isOpen) {
  <!-- Ventana del Chat (Visible por defecto para previsualización) -->
  <div class="mb-4 w-80 sm:w-96 h-96 bg-white rounded-2xl shadow-2xl border border-gray-200 
            flex flex-col overflow-hidden transition-all duration-300 transform scale-100 origin-bottom-right">
    <!-- Header -->
    <div class="bg-blue-600 p-4 text-white flex justify-between items-center shadow-md">
      <div class="flex items-center gap-2">
        <span class="relative flex h-3 w-3">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
        </span>
        <h3 class="font-semibold text-sm">Chat Support</h3>
      </div>
      <button (click)="toggleChat()" class="hover:bg-blue-700 rounded-full p-1 transition-colors">
        <!-- Icono de cerrar (X) simulado con texto si no tienes MatIcon cargado aún -->
        <span class="material-icons text-lg">close</span>
      </button>
    </div>

    <div class="flex-1 p-4 overflow-y-auto bg-gray-50 space-y-4">
        <!-- Aquí irían tus @for de mensajes -->
        <div class="flex justify-start">
          <div class="bg-white text-gray-800 border border-gray-200 
                      rounded-r-xl rounded-tl-xl max-w-[80%] p-3 shadow-sm text-sm">
            ¡Hi! How can i help you today?
          </div>
        </div>
        @for (msg of messages(); track $index) {
          <div [class]="msg.role === 'User' ? 'flex justify-end' : 'flex justify-start'">
            <div [class]="msg.role === 'User' 
                ? 'bg-blue-600 text-white rounded-l-xl rounded-tr-xl' 
                : 'bg-white text-gray-800 border border-gray-200 rounded-r-xl rounded-tl-xl'"
                 class="max-w-[80%] p-3 shadow-sm text-sm">
              {{ msg.text }}
            </div>
          </div>
        } @empty {
          <div class="text-center text-gray-400 text-xs mt-4">Not massage yet</div>
        }
    </div>

    <!-- Input Area -->
    <div class="p-4 bg-white border-t border-gray-100 flex items-center gap-2">
      <input 
        [(ngModel)]="currentMessage"
        (keyup.enter)="sendMessage()"
        type="text"
        class="flex-1 bg-gray-100 border-none rounded-full px-4 py-2 text-sm 
            focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-gray-400"
        placeholder="Escribe un mensaje...">
      
      <button (click)="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white p-2 
            rounded-full shadow-md transition-all active:scale-90">
        <span class="material-icons text-sm">send</span>
      </button>
    </div>
  </div>
    }
  <!-- Botón Flotante (Trigger) -->
  <button
    (click)="toggleChat()"
    class="w-14 h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg 
          flex items-center justify-center transition-all hover:scale-110 active:scale-95 group">
    <mat-icon class="text-2xl transition-transform">
      {{ isOpen ? 'expand_more' : 'chat' }}
    </mat-icon>
  </button>
</div>
