
services:
  sqlserver: 
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: skinet-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password123!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
  redis:
    image: redis:7-alpine
    container_name: skinet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
  sql_data: